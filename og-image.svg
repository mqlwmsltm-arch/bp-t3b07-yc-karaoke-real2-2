<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="708" cy="405" r="41" fill="#1565c0" opacity="0.13"/>
    <circle cx="1129" cy="273" r="60" fill="#1565c0" opacity="0.08"/>
    <circle cx="1000" cy="198" r="94" fill="#1565c0" opacity="0.17"/>
    <circle cx="367" cy="197" r="90" fill="#1565c0" opacity="0.07"/>
    <circle cx="1254" cy="460" r="89" fill="#1565c0" opacity="0.07"/>
    <circle cx="1187" cy="641" r="46" fill="#1565c0" opacity="0.19"/>
    <rect x="1233" y="202" width="94" height="54" rx="8" fill="#0d47a1" opacity="0.13" transform="rotate(34, 775, 190)"/>
    <rect x="1133" y="476" width="51" height="80" rx="8" fill="#0d47a1" opacity="0.09" transform="rotate(33, 22, 415)"/>
    <rect x="963" y="399" width="81" height="20" rx="8" fill="#0d47a1" opacity="0.06" transform="rotate(34, 921, 252)"/>
    <rect x="-68" y="472" width="26" height="57" rx="8" fill="#0d47a1" opacity="0.11" transform="rotate(40, 652, 626)"/>
    <rect x="229" y="564" width="36" height="65" rx="8" fill="#0d47a1" opacity="0.10" transform="rotate(39, 937, 43)"/>
    <rect x="758" y="-61" width="41" height="97" rx="8" fill="#0d47a1" opacity="0.03" transform="rotate(37, 54, -52)"/>
    <rect x="512" y="-71" width="52" height="39" rx="8" fill="#0d47a1" opacity="0.13" transform="rotate(5, 74, 194)"/>
    <rect x="331" y="232" width="87" height="22" rx="8" fill="#0d47a1" opacity="0.13" transform="rotate(6, 821, 676)"/>
    <polygon points="796,129 885,307 707,307" fill="#1565c0" opacity="0.09"/>
    <polygon points="1221,477 1264,563 1178,563" fill="#1565c0" opacity="0.06"/>
    <polygon points="652,326 682,386 622,386" fill="#1565c0" opacity="0.05"/>
    <polygon points="350,-21 431,141 269,141" fill="#1565c0" opacity="0.03"/>

  <!-- Wave at bottom -->
  <path d="M0,532 C360,581 840,483 1200,532 L1200,630 L0,630Z" fill="#1565c0" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    염창 가라오케 찐후기
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    염창 — 가라오케
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#00bcd4" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    염창 염창 가라오케 찐후기 — 가라오케
  </text>
</svg>